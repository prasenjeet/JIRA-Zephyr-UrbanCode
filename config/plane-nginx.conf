# Nginx reverse-proxy for Plane.
# Routes /api/ and /auth/ to the Django backend; everything else to Next.js.

upstream plane_api {
    server plane-api:8000;
}

upstream plane_web {
    server plane-web:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # Django API
    location ~ ^/(api|auth|sso)/ {
        proxy_pass         http://plane_api;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
    }

    # Next.js frontend (including WebSocket for HMR in dev mode)
    location / {
        proxy_pass         http://plane_web;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
    }
}
