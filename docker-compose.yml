---
# ─────────────────────────────────────────────────────────────────────────────
# Plane · Kiwi TCMS · Wiki.js · UrbanCode Deploy
# Local Docker stack for development / integration testing
#
# Quick start:
#   cp .env.docker .env          # fill in secrets (SECRET_KEY at minimum)
#   docker compose up -d
#
# Service URLs (after first-time setup):
#   Plane      → http://localhost:${PLANE_PORT:-80}
#   Kiwi TCMS  → https://localhost:${KIWI_PORT:-8443}  (accept self-signed cert)
#   Wiki.js    → http://localhost:${WIKIJS_PORT:-3000}
#   UrbanCode  → https://localhost:${UCD_PORT:-8444}    (commented out, see below)
#
# First-run steps:
#   1. Plane:    open http://localhost and complete the sign-up wizard
#                then create a workspace, project, and generate an API token
#                from Settings → API Tokens
#   2. Kiwi:     docker compose exec kiwi /Kiwi/manage.py createsuperuser
#                then open https://localhost:${KIWI_PORT:-8443} and log in
#                → Settings → API → generate an API key
#   3. Wiki.js:  open http://localhost:${WIKIJS_PORT:-3000} and complete setup
#                then Administration → API Access → generate a token
#   4. UrbanCode: uncomment the service block, supply an IBM entitlement key,
#                 and re-run docker compose up -d
#
# See scripts/docker-setup.sh for automated startup and a full checklist.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ═══════════════════════════════════════════════════════════════════════════
  # PLANE  (project management — replaces JIRA)
  # ═══════════════════════════════════════════════════════════════════════════

  plane-db:
    image: postgres:15-alpine
    container_name: plane-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${PLANE_DB_NAME:-planedb}
      POSTGRES_USER: ${PLANE_DB_USER:-plane}
      POSTGRES_PASSWORD: ${PLANE_DB_PASSWORD:-planepassword}
    volumes:
      - plane-db-data:/var/lib/postgresql/data
    networks:
      - integration-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PLANE_DB_USER:-plane} -d ${PLANE_DB_NAME:-planedb}"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-redis:
    image: redis:7-alpine
    container_name: plane-redis
    restart: unless-stopped
    volumes:
      - plane-redis-data:/data
    networks:
      - integration-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  plane-api:
    image: makeplane/plane-backend:stable
    container_name: plane-api
    # Run migrations first, then start the API server.
    # manage.py migrate is idempotent — safe to run on every restart.
    command: sh -c "python manage.py wait_for_db && python manage.py migrate --noinput && ./bin/docker-entrypoint-api.sh"
    restart: unless-stopped
    environment: &plane-backend-env
      DJANGO_SETTINGS_MODULE: plane.settings.production
      DATABASE_URL: "postgresql://${PLANE_DB_USER:-plane}:${PLANE_DB_PASSWORD:-planepassword}@plane-db:5432/${PLANE_DB_NAME:-planedb}"
      REDIS_URL: "redis://plane-redis:6379/"
      CELERY_BROKER_URL: "redis://plane-redis:6379/"
      CELERY_RESULT_BACKEND: "redis://plane-redis:6379/"
      SECRET_KEY: "${PLANE_SECRET_KEY:?Set PLANE_SECRET_KEY in .env}"
      CORS_ALLOWED_ORIGINS: "http://localhost,http://localhost:${PLANE_PORT:-80}"
      WEB_URL: "http://localhost:${PLANE_PORT:-80}"
      SITE_ADDRESS: "http://localhost:${PLANE_PORT:-80}"
      GUNICORN_WORKERS: "2"
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
    networks:
      - integration-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  plane-worker:
    image: makeplane/plane-backend:stable
    container_name: plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    restart: unless-stopped
    environment: *plane-backend-env
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-api:
        condition: service_healthy
    networks:
      - integration-net

  plane-beat:
    image: makeplane/plane-backend:stable
    container_name: plane-beat
    command: ./bin/docker-entrypoint-beat.sh
    restart: unless-stopped
    environment: *plane-backend-env
    depends_on:
      plane-db:
        condition: service_healthy
      plane-redis:
        condition: service_healthy
      plane-api:
        condition: service_healthy
    networks:
      - integration-net

  plane-web:
    image: makeplane/plane-frontend:stable
    container_name: plane-web
    restart: unless-stopped
    depends_on:
      plane-api:
        condition: service_healthy
    networks:
      - integration-net

  # nginx reverse-proxy: routes / → plane-web:3000, /api/ → plane-api:8000
  plane-proxy:
    image: nginx:alpine
    container_name: plane-proxy
    restart: unless-stopped
    ports:
      - "${PLANE_PORT:-80}:80"
    volumes:
      - ./config/plane-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - plane-web
      - plane-api
    networks:
      - integration-net

  # ═══════════════════════════════════════════════════════════════════════════
  # KIWI TCMS  (test case management — replaces Zephyr Scale)
  # ═══════════════════════════════════════════════════════════════════════════

  kiwi-db:
    image: mariadb:10.11
    container_name: kiwi-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${KIWI_DB_NAME:-kiwi}
      MYSQL_USER: ${KIWI_DB_USER:-kiwi}
      MYSQL_PASSWORD: ${KIWI_DB_PASSWORD:-kiwipassword}
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
    volumes:
      - kiwi-db-data:/var/lib/mysql
    networks:
      - integration-net
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u ${KIWI_DB_USER:-kiwi} -p${KIWI_DB_PASSWORD:-kiwipassword} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kiwi:
    image: kiwitcms/kiwi:latest
    container_name: kiwi
    restart: unless-stopped
    ports:
      - "${KIWI_HTTP_PORT:-8080}:8080"
      - "${KIWI_PORT:-8443}:8443"
    environment:
      KIWI_DB_ENGINE: django.db.backends.mysql
      KIWI_DB_HOST: kiwi-db
      KIWI_DB_PORT: "3306"
      KIWI_DB_NAME: ${KIWI_DB_NAME:-kiwi}
      KIWI_DB_USER: ${KIWI_DB_USER:-kiwi}
      KIWI_DB_PASSWORD: ${KIWI_DB_PASSWORD:-kiwipassword}
    volumes:
      - kiwi-uploads:/Kiwi/uploads
      - kiwi-static:/Kiwi/static
      - ./config/kiwi-nginx.conf:/Kiwi/etc/nginx.conf:ro
    depends_on:
      kiwi-db:
        condition: service_healthy
    networks:
      - integration-net
    healthcheck:
      test: ["CMD-SHELL", "curl -kfs https://127.0.0.1:8443/accounts/login/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # ═══════════════════════════════════════════════════════════════════════════
  # WIKI.JS  (documentation wiki — replaces Confluence)
  # ═══════════════════════════════════════════════════════════════════════════

  wikijs-db:
    image: postgres:15-alpine
    container_name: wikijs-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${WIKIJS_DB_NAME:-wikijs}
      POSTGRES_USER: ${WIKIJS_DB_USER:-wikijs}
      POSTGRES_PASSWORD: ${WIKIJS_DB_PASSWORD:-wikijspassword}
    volumes:
      - wikijs-db-data:/var/lib/postgresql/data
    networks:
      - integration-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${WIKIJS_DB_USER:-wikijs} -d ${WIKIJS_DB_NAME:-wikijs}"]
      interval: 10s
      timeout: 5s
      retries: 5

  wikijs:
    image: ghcr.io/requarks/wiki:2
    container_name: wikijs
    restart: unless-stopped
    ports:
      - "${WIKIJS_PORT:-3000}:3000"
    environment:
      DB_TYPE: postgres
      DB_HOST: wikijs-db
      DB_PORT: "5432"
      DB_NAME: ${WIKIJS_DB_NAME:-wikijs}
      DB_USER: ${WIKIJS_DB_USER:-wikijs}
      DB_PASS: ${WIKIJS_DB_PASSWORD:-wikijspassword}
    depends_on:
      wikijs-db:
        condition: service_healthy
    networks:
      - integration-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ═══════════════════════════════════════════════════════════════════════════
  # IBM URBANCODE DEPLOY  (deployment automation)
  #
  # Requires an IBM entitlement key from myibm.ibm.com:
  #   docker login cp.icr.io --username cp --password <entitlement-key>
  # Then uncomment this block and run: docker compose up -d urbancode
  # ═══════════════════════════════════════════════════════════════════════════

  # urbancode:
  #   image: cp.icr.io/cp/urbancode/urbancode-deploy:7.3.2.0
  #   container_name: urbancode
  #   restart: unless-stopped
  #   ports:
  #     - "${UCD_PORT:-8444}:8443"
  #     - "7918:7918"
  #   environment:
  #     LICENSE_ACCEPT: "Y"
  #     UCD_SERVER_URL: "https://localhost:${UCD_PORT:-8444}"
  #   volumes:
  #     - urbancode-data:/opt/tomcat/appdata
  #   networks:
  #     - integration-net

# ── Volumes ───────────────────────────────────────────────────────────────────

volumes:
  plane-db-data:
  plane-redis-data:
  kiwi-db-data:
  kiwi-uploads:
  kiwi-static:
  wikijs-db-data:
  urbancode-data:

# ── Networks ──────────────────────────────────────────────────────────────────

networks:
  integration-net:
    driver: bridge
